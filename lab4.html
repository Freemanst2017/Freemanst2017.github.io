<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store</title>

        
</head>
<body>

    <h1>Online Store</h1>
    <p id="greeting"></p>
    <p id="order"></p>
    <p id="arrival"></p>
    <script>
        alert("Welcome to the Store");
        let name = prompt("What is your name ");
        let item = prompt("What item could you like to order  ");
        let quantity = prompt("How many item could you like to order?(1-99)");

        while(quantity < 1 || quantity > 99){
            quantity = prompt("Please enter a number between 1 and 99");

        }
        

        let today = new Date();
        let hour  = today.getHours();
        let greeting;


        if(hour < 12){
            greeting = "Good Morning";

        }
        else if(hour < 18){
            greeting = "Good Afternoon";
        }
        else{
            greeting = "Good Evening"
        }

        let arrivalDate = new Date();
        arrivalDate.setDate(arrivalDate.getDate()+7);

        document.getElementById("greeting").innerHTML =
        greeting + " " + name + ", Thank you for ordering!";

        document.getElementById("order").innerHTML =
        "You ordered " + quantity + " " + item + "(s).";

        document.getElementById("arrival").innerHTML =
        "Your order will arrive on: " + arrivalDate.toDateString();

      

    </script>

    
</body>
</html>
